name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Describe it below. Be as specific as possible.

  - type: dropdown
    id: repo
    attributes:
      label: Repository
      description: Which Cerid AI project is this for?
      options:
        - cerid-ai (Knowledge Companion)
        - cerid-boardroom
        - cerid-trading-agent
        - Platform-wide / new product
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve? What's the current pain point?
      placeholder: Currently, when I do X, I have to manually do Y which is time-consuming.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Critical / blocking
    validations:
      required: true
